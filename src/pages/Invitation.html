<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Cinematic Wedding</title>
    <style>
        /* --- Premium Font Imports --- */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Pinyon+Script&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #030303; /* Deep Royal Black */
            color: #ffffff;
            overflow-x: hidden; /* Strictly hiding anything below */
        }

        /* --- 100% Focused Hero Section --- */
        #royal-hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Cinematic Background with Slow Zoom (Ken Burns) */
        .cinematic-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Replace with a high-end royal palace or dark floral image */
            background: url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            animation: slowZoom 25s linear infinite alternate;
            z-index: 1;
            filter: brightness(0.35) contrast(1.2); /* Moody and dramatic */
        }

        /* Grand Vignette Overlay */
        .vignette-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 10%, rgba(3,3,3,0.95) 90%);
            z-index: 2;
        }

        /* Canvas for Gold Dust Particles */
        #gold-dust {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none; /* Allows clicking elements below */
        }

        /* --- The Royal Invitation Card Container --- */
        .invitation-frame {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px 40px;
            /* Premium Glassmorphism & Gold Border */
            border: 1px solid rgba(212, 175, 55, 0.4);
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(8px);
            box-shadow: 0 0 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(212, 175, 55, 0.05);
            max-width: 900px;
            width: 90%;
            opacity: 0;
            /* Smooth sweeping entrance */
            animation: sweepUp 3s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        /* Elegant Corner Accents */
        .invitation-frame::before, .invitation-frame::after {
            content: '';
            position: absolute;
            width: 80px; height: 80px;
            border: 2px solid #d4af37; /* Metallic Gold */
            opacity: 0.8;
        }
        .invitation-frame::before {
            top: -15px; left: -15px;
            border-right: none; border-bottom: none;
        }
        .invitation-frame::after {
            bottom: -15px; right: -15px;
            border-left: none; border-top: none;
        }

        /* --- Typography & Elements --- */
        .subtitle {
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-size: 0.9rem;
            color: #d4af37;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInReveal 2s ease 2s forwards;
        }

        /* The Focal Point: Cinematic Text Reveal */
        .couple-names {
            font-family: 'Pinyon Script', cursive;
            font-size: 6.5rem;
            line-height: 1.1;
            margin: 10px 0;
            /* Text Gradient for realistic gold shimmer */
            background: -webkit-linear-gradient(45deg, #fdfbfb 0%, #ebedee 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 30px rgba(212, 175, 55, 0.3);
            
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            filter: blur(12px);
            animation: cinematicFocus 3.5s cubic-bezier(0.25, 1, 0.5, 1) 2.5s forwards;
        }

        .ampersand {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: #d4af37;
            -webkit-text-fill-color: #d4af37;
            display: block;
            margin: 10px 0;
            text-shadow: none;
        }

        /* Royal Divider */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
            opacity: 0;
            animation: fadeInReveal 2s ease 4s forwards;
        }
        .divider-line {
            height: 1px; width: 120px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.8), transparent);
        }
        .divider-diamond {
            width: 10px; height: 10px;
            background: #d4af37;
            transform: rotate(45deg);
            margin: 0 20px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
        }

        .details {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            letter-spacing: 4px;
            color: #e0e0e0;
            opacity: 0;
            animation: fadeInReveal 2s ease 4.5s forwards;
        }

        /* --- Scroll Indicator --- */
        .scroll-down {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeInReveal 2s ease 6s forwards;
        }
        .scroll-text {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: #d4af37;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .mouse {
            width: 26px; height: 42px;
            border: 2px solid rgba(212, 175, 55, 0.6);
            border-radius: 15px;
            position: relative;
        }
        .wheel {
            width: 4px; height: 8px;
            background: #d4af37;
            border-radius: 2px;
            position: absolute;
            top: 6px; left: 50%;
            transform: translateX(-50%);
            animation: scrollWheel 2s cubic-bezier(0.15, 0.41, 0.69, 0.94) infinite;
        }

        /* --- Master Animations --- */
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.18); } /* Subtle scaling */
        }
        @keyframes sweepUp {
            from { opacity: 0; transform: translateY(80px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInReveal {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes cinematicFocus {
            from { opacity: 0; transform: scale(0.9) translateY(20px); filter: blur(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        @keyframes scrollWheel {
            0% { top: 6px; opacity: 1; height: 8px; }
            50% { top: 18px; opacity: 0; height: 12px; }
            100% { top: 6px; opacity: 0; height: 8px; }
        }

        /* Responsive Design for Mobile */
        @media (max-width: 768px) {
            .couple-names { font-size: 4rem; }
            .ampersand { font-size: 2rem; }
            .invitation-frame { padding: 40px 20px; width: 85%; }
            .subtitle { font-size: 0.75rem; letter-spacing: 5px; }
            .details { font-size: 1rem; letter-spacing: 2px; }
            .divider-line { width: 60px; }
        }
    </style>
</head>
<body>

    <section id="royal-hero">
        
        <div class="cinematic-bg"></div>
        <div class="vignette-overlay"></div>
        <canvas id="gold-dust"></canvas>

        <div class="invitation-frame">
            <div class="subtitle">You are cordially invited to</div>
            
            <h1 class="couple-names">
                Siddharth 
                <span class="ampersand">&</span> 
                Ananya
            </h1>
            
            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-diamond"></div>
                <div class="divider-line"></div>
            </div>
            
            <div class="details">
                24th November 2026 <br><br>
                <span style="font-size: 0.9rem; color: #d4af37;">The Taj Mahal Palace, Mumbai</span>
            </div>
        </div>

        <div class="scroll-down">
            <div class="scroll-text">Experience The Royal Journey</div>
            <div class="mouse"><div class="wheel"></div></div>
        </div>

    </section>

    <script>
        const canvas = document.getElementById('gold-dust');
        const ctx = canvas.getContext('2d');
        
        let particlesArray = [];

        // Handle Resize
        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setCanvasSize);
        setCanvasSize();

        // Particle Blueprint
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5;
                // Slow, graceful upward movement
                this.speedY = (Math.random() * 0.4) + 0.1;
                // Slight horizontal drift
                this.speedX = (Math.random() * 0.2) - 0.1; 
                this.opacity = Math.random() * 0.6 + 0.1;
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;

                // Reset particle to bottom when it floats off screen
                if (this.y < 0 - this.size) {
                    this.y = canvas.height + this.size;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                // Creating a glowing gold effect
                ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(212, 175, 55, 0.8)";
                ctx.fill();
            }
        }

        // Initialize Particles
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 8000; // Responsive density
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>



<style>
    /* 1. The Scroll Universe (Gives us scrolling height) */
    #scroll-universe {
        position: relative;
        width: 100vw;
        height: 500vh; /* 500vh gives a very long, smooth scroll duration */
        background-color: #010a06;
        z-index: 5;
    }

    /* 2. The Sticky Canvas (Locks in place while scrolling) */
    .sticky-cinema-canvas {
        position: sticky;
        top: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #020202;
    }

    /* 3. Deep Palace Background */
    .palace-bg-layer {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: url('https://images.unsplash.com/photo-1585675100414-22cb730245cb?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
        opacity: 0.15;
        filter: blur(8px) contrast(1.2) sepia(0.4);
        transform: scale(1);
        transform-origin: center 70%;
        will-change: transform, opacity, filter;
        z-index: 1;
    }

    /* Vignette for dark cinematic edges */
    .cinema-vignette {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at center, transparent 20%, #010a06 90%);
        z-index: 2;
        pointer-events: none;
    }

    /* 4. Giant Background Typography */
    .giant-bg-text {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'Cinzel', serif;
        font-size: 20vw;
        color: rgba(212, 175, 55, 0.03); /* Barely visible gold */
        white-space: nowrap;
        z-index: 3;
        font-weight: 700;
        will-change: transform;
    }

    /* 5. The Royal Characters (Sliding Panels) */
    .character-panel {
        position: absolute;
        height: 85vh;
        bottom: -5vh; /* Slight offset for parallax */
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: center;
        opacity: 0;
        will-change: transform, opacity;
    }

    /* Smooth Gradient Mask to blend standard photos into the black background */
    .character-photo {
        height: 100%;
        width: auto;
        max-width: 45vw;
        object-fit: cover;
        border-radius: 20px 20px 0 0;
        /* This makes the bottom of the image fade into transparency */
        -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        filter: grayscale(80%) sepia(20%) contrast(1.2);
        transition: filter 0.5s ease;
    }

    /* Client Hover interaction on the scrolling elements */
    .character-panel:hover .character-photo {
        filter: grayscale(0%) sepia(0%) contrast(1.1);
    }

    .bride-panel {
        left: 5%;
        transform: translateX(-50vw);
    }

    .groom-panel {
        right: 5%;
        transform: translateX(50vw);
    }

    /* 6. Foreground Cinematic Text */
    .story-title {
        position: absolute;
        z-index: 10;
        text-align: center;
        width: 100%;
        opacity: 0;
        will-change: transform, opacity;
    }

    .story-title-main {
        font-family: 'Pinyon Script', cursive;
        font-size: 8rem;
        background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        -webkit-background-clip: text;
        color: transparent;
        text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        top: 35%;
        transform: translateY(50px) scale(0.9);
    }

    .story-title-sub {
        font-family: 'Cinzel', serif;
        font-size: 1.2rem;
        letter-spacing: 15px;
        color: #fff;
        text-transform: uppercase;
        top: 55%;
        transform: translateY(30px);
    }

    /* 7. Divine Glow (Final Union) */
    .divine-mandala-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 800px; height: 800px;
        background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 60%);
        border-radius: 50%;
        z-index: 4;
        opacity: 0;
        mix-blend-mode: screen;
        will-change: opacity, transform;
    }

    @media (max-width: 768px) {
        .character-panel { height: 60vh; bottom: 10vh; }
        .character-photo { max-width: 80vw; }
        .bride-panel { left: 50%; margin-left: -40vw; transform: translateY(50vh); }
        .groom-panel { right: 50%; margin-right: -40vw; transform: translateY(50vh); }
        .story-title-main { font-size: 4rem; top: 20%; }
        .story-title-sub { font-size: 0.8rem; letter-spacing: 5px; top: 80%; }
    }

    /* Pure CSS Premium Cutout Placeholders for Testing */
    .css-cutout-placeholder {
        width: 35vw;
        height: 75vh;
        /* Golden gradient fading into dark */
        background: linear-gradient(to bottom, rgba(212, 175, 55, 0.15), transparent);
        border: 2px dashed rgba(212, 175, 55, 0.4);
        border-radius: 200px 200px 0 0;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
        box-shadow: inset 0 50px 50px -50px rgba(212, 175, 55, 0.3);
    }
    .placeholder-text {
        color: #d4af37;
        font-family: 'Cinzel', serif;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-size: 1.2rem;
        opacity: 0.8;
    }
    
    @media (max-width: 768px) {
        .css-cutout-placeholder { width: 70vw; height: 50vh; }
    }
</style>

<section id="scroll-universe">
    <div class="sticky-cinema-canvas">
        
        <div class="palace-bg-layer" id="bg-palace"></div>
        <div class="cinema-vignette"></div>

        <div class="giant-bg-text" id="giant-text">ETERNITY</div>

        <div class="divine-mandala-glow" id="divine-glow"></div>

        <div class="character-panel bride-panel" id="bride-layer">
            <div class="css-cutout-placeholder">
                <div class="placeholder-text">Client Bride PNG</div>
            </div>
        </div>

        <div class="character-panel groom-panel" id="groom-layer">
            <div class="css-cutout-placeholder">
                <div class="placeholder-text">Client Groom PNG</div>
            </div>
        </div>

        <div class="story-title story-title-main" id="text-main">Two Legacies</div>
        <div class="story-title story-title-sub" id="text-sub">One Royal Destiny</div>

    </div>
</section>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const universe = document.getElementById('scroll-universe');
        const palace = document.getElementById('bg-palace');
        const giantText = document.getElementById('giant-text');
        const brideLayer = document.getElementById('bride-layer');
        const groomLayer = document.getElementById('groom-layer');
        const textMain = document.getElementById('text-main');
        const textSub = document.getElementById('text-sub');
        const divineGlow = document.getElementById('divine-glow');

        // requestAnimationFrame for smooth 60fps rendering
        let ticking = false;

        function updateCinematicScroll() {
            // Get scroll position relative to the universe section
            const rect = universe.getBoundingClientRect();
            const windowHeight = window.innerHeight;
            
            // Calculate how far we've scrolled INSIDE the #scroll-universe
            const scrollDistance = -rect.top; 
            const maxScroll = rect.height - windowHeight;
            
            // Progress from 0.0 to 1.0
            let progress = scrollDistance / maxScroll;
            if (progress < 0) progress = 0;
            if (progress > 1) progress = 1;

            /* =========================================================
               THE CHOREOGRAPHY (Map progress to animations)
               ========================================================= */

            // 1. Palace Zoom & Blur (0 to 100%)
            // Scales from 1 to 1.3, blur reduces from 8px to 2px
            const scale = 1 + (progress * 0.3);
            const blur = 8 - (progress * 6);
            palace.style.transform = `scale(${scale})`;
            palace.style.filter = `blur(${blur}px) contrast(1.2) sepia(0.4)`;

            // 2. Giant Text Parallax (Moves left slowly)
            const textMove = progress * -30; // Moves -30vw
            giantText.style.transform = `translate(-50%, -50%) translateX(${textMove}vw)`;

            // 3. Bride Entrance (Moves in between 5% and 35% scroll progress)
            if (progress >= 0.05 && progress <= 0.35) {
                const phase = (progress - 0.05) / 0.30;
                // Move from -50vw to 0
                const moveX = -50 + (phase * 50);
                brideLayer.style.transform = `translateX(${moveX}vw)`;
                brideLayer.style.opacity = phase;
            } else if (progress > 0.35) {
                brideLayer.style.transform = `translateX(0vw)`;
                brideLayer.style.opacity = 1;
            } else {
                brideLayer.style.transform = `translateX(-50vw)`;
                brideLayer.style.opacity = 0;
            }

            // 4. Groom Entrance (Moves in between 25% and 55% scroll progress)
            // Starts slightly after bride
            if (progress >= 0.25 && progress <= 0.55) {
                const phase = (progress - 0.25) / 0.30;
                // Move from 50vw to 0
                const moveX = 50 - (phase * 50);
                groomLayer.style.transform = `translateX(${moveX}vw)`;
                groomLayer.style.opacity = phase;
            } else if (progress > 0.55) {
                groomLayer.style.transform = `translateX(0vw)`;
                groomLayer.style.opacity = 1;
            } else {
                groomLayer.style.transform = `translateX(50vw)`;
                groomLayer.style.opacity = 0;
            }

            // 5. Cinematic Text Reveal (Between 50% and 75%)
            if (progress >= 0.50 && progress <= 0.75) {
                const phase = (progress - 0.50) / 0.25;
                
                textMain.style.opacity = phase;
                textMain.style.transform = `translateY(${50 - (phase * 50)}px) scale(${0.9 + (phase * 0.1)})`;
                
                textSub.style.opacity = phase;
                textSub.style.transform = `translateY(${30 - (phase * 30)}px)`;
            } else if (progress > 0.75) {
                textMain.style.opacity = 1;
                textMain.style.transform = `translateY(0px) scale(1)`;
                textSub.style.opacity = 1;
                textSub.style.transform = `translateY(0px)`;
            } else {
                textMain.style.opacity = 0;
                textSub.style.opacity = 0;
            }

            // 6. Divine Glow Final Union (Between 70% and 90%)
            if (progress >= 0.70 && progress <= 0.90) {
                const phase = (progress - 0.70) / 0.20;
                divineGlow.style.opacity = phase;
                divineGlow.style.transform = `translate(-50%, -50%) scale(${0.5 + (phase * 0.5)})`;
            } else if (progress > 0.90) {
                divineGlow.style.opacity = 1;
                divineGlow.style.transform = `translate(-50%, -50%) scale(1)`;
            } else {
                divineGlow.style.opacity = 0;
            }

            ticking = false;
        }

        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(updateCinematicScroll);
                ticking = true;
            }
        });

        // Trigger once on load to set initial states
        updateCinematicScroll();
    });
</script>



    
</body>
